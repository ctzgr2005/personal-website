``` 
 body { 
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', 
Arial, sans-serif; 
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
 min-height: 100vh; 
 padding: 20px; 
 } 
 .container { 
 max-width: 800px; 
 margin: 0 auto; 
 } 
 /* 头部 */ 
 .header { 
 background: white; 
 border-radius: 20px; 
 padding: 40px 30px; 
 margin-bottom: 30px; 
 box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); 
 animation: slideDown 0.6s ease; 
 } 
 .profile-section { 
 display: flex; 
 align-items: center; 
 gap: 30px; 
 } 
 .avatar { 
 width: 120px; 
 height: 120px; 
 border-radius: 50%; 
 object-fit: cover; 
 border: 4px solid #667eea; 
 box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3); 
 } 
 .profile-info { 
 flex: 1; 
 } 
 .name { 
 font-size: 32px; 
 font-weight: 700; 
 color: #333; 
 margin-bottom: 10px; 
 } 
 .bio { 
 font-size: 16px; 
 color: #666; 
 line-height: 1.5; 
 } 
 /* 卡片 */ 
 .card { 
 background: white; 
 border-radius: 15px; 
 padding: 30px; 
 margin-bottom: 20px; 
 box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08); 
 animation: slideUp 0.6s ease forwards; 
 } 
 .card:nth-child(2) { animation-delay: 0.1s; } 
 .card:nth-child(3) { animation-delay: 0.2s; } 
 .card:nth-child(4) { animation-delay: 0.3s; } 
 .card:nth-child(5) { animation-delay: 0.4s; } 
 .card h2 { 
 font-size: 24px; 
 color: #333; 
 margin-bottom: 20px; 
 padding-bottom: 10px; 
 border-bottom: 2px solid #667eea; 
 } 
 /* 信息网格 */ 
 .info-grid { 
 display: grid; 
 grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
 gap: 20px; 
 } 
 .info-item { 
 display: flex; 
 flex-direction: column; 
 padding: 15px; 
 background: #f8f9ff; 
 border-radius: 10px; 
 border-left: 4px solid #667eea; 
 } 
 .label { 
 font-size: 14px; 
 color: #666; 
 margin-bottom: 8px; 
 font-weight: 600; 
 } 
 .value { 
 font-size: 16px; 
 color: #333; 
 font-weight: 500; 
 } 
 /* 按钮 */ 
 .contact-links { 
 display: flex; 
 flex-wrap: wrap; 
 gap: 15px; 
 } 
 .btn { 
 padding: 12px 24px; 
 border-radius: 8px; 
 text-decoration: none; 
 font-weight: 600; 
 font-size: 15px; 
 transition: all 0.3s ease; 
 border: none; 
 cursor: pointer; 
 display: inline-block; 
 } 
 .btn-primary { 
 background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
 color: white; 
 } 
 .btn-primary:hover { 
 transform: translateY(-2px); 
 box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4); 
 } 
 .btn-secondary { 
 background: #f0f0f0; 
 color: #333; 
 border: 2px solid #667eea; 
 } 
 .btn-secondary:hover { 
 background: #667eea; 
 color: white; 
 transform: translateY(-2px); 
 } 
 /* 描述文本 */ 
 .description { 
 font-size: 16px; 
 line-height: 1.8; 
 color: #555; 
 text-align: justify; 
 } 
 /* 技能 */ 
 .skills-grid { 
 display: grid; 
 gap: 20px; 
 } 
 .skill-item { 
 display: flex; 
 flex-direction: column; 
 gap: 8px; 
 } 
 .skill-name { 
 font-size: 15px; 
 font-weight: 600; 
 color: #333; 
 } 
 .skill-bar { 
 height: 8px; 
 background: #e0e0e0; 
 border-radius: 10px; 
 overflow: hidden; 
 } 
 .skill-progress { 
 height: 100%; 
 background: linear-gradient(90deg, #667eea 0%, #764ba2 100%); 
 border-radius: 10px; 
 transition: width 0.3s ease; 
 } 
 .skill-item:hover .skill-progress { 
 width: calc(100% - 10px) !important; 
 } 
 /* 社交媒体 */ 
 .social-links { 
 display: flex; 
 flex-wrap: wrap; 
 gap: 12px; 
 } 
 .social-btn { 
 padding: 10px 20px; 
 border-radius: 8px; 
 text-decoration: none; 
 font-weight: 600; 
 font-size: 14px; 
 transition: all 0.3s ease; 
 border: 2px solid #ddd; 
 } 
 .social-btn:hover { 
 transform: translateY(-3px); 
 box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15); 
 } 
 .github { 
 background: #333; 
 color: white; 
 border-color: #333; 
 } 
 .github:hover { 
 background: #555; 
 } 
 .twitter { 
 background: #1DA1F2; 
 color: white; 
 border-color: #1DA1F2; 
 } 
 .twitter:hover { 
 background: #1a8cd8; 
 } 
 .linkedin { 
 background: #0077B5; 
 color: white; 
 border-color: #0077B5; 
 } 
 .linkedin:hover { 
 background: #005885; 
 } 
 .weibo { 
 background: #E6162D; 
 color: white; 
 border-color: #E6162D; 
 } 
 .weibo:hover { 
 background: #cc1029; 
 } 
 /* 页脚 */ 
 .footer { 
 text-align: center; 
 color: white; 
 margin-top: 40px; 
 padding: 20px; 
 font-size: 14px; 
 } 
 .made-with { 
 margin-top: 10px; 
 font-size: 16px; 
 } 
 /* 动画 */ 
 @keyframes slideDown { 
 from { 
 opacity: 0; 
 transform: translateY(-30px); 
 } 
 to { 
 opacity: 1; 
 transform: translateY(0); 
 } 
 } 
 @keyframes slideUp { 
 from { 
 opacity: 0; 
 transform: translateY(30px); 
 } 
 to { 
 opacity: 1; 
 transform: translateY(0); 
 } 
 } 
 /* 响应式设计 */ 
 @media (max-width: 600px) { 
 .header { 
 padding: 30px 20px; 
 } 
 .profile-section { 
 flex-direction: column; 
 text-align: center; 
 gap: 20px; 
 } 
 .avatar { 
 width: 100px; 
 height: 100px; 
 } 
 .name { 
 font-size: 24px; 
 } 
 .card { 
 padding: 20px; 
 } 
 .card h2 { 
 font-size: 20px; 
 } 
 .info-grid { 
 grid-template-columns: 1fr; 
 } 
 .contact-links { 
 flex-direction: column; 
 } 
 .btn { 
 width: 100%; 
 text-align: center; 
 } 
 .social-links { 
 justify-content: center; 
 } 
 } 
</style>
